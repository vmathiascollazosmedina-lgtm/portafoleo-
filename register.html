<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Sitio Web</title>
    <!-- Conectamos el archivo de estilos exclusivo para el registro -->
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <!-- Contenedor principal de la tarjeta de registro -->
    <div class="register-container">
        <div class="register-header">
            <h2>Crear Cuenta</h2>
            <p>Únete a nuestra comunidad</p>
        </div>

        <form class="register-form">
            <div class="input-group">
                <label for="usuario">Nombre de usuario</label>
                <input type="text" id="usuario" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <a href="index.html" class="btn-submit" style="display: flex; align-items: center; justify-content: center; text-decoration: none; box-sizing: border-box;">Registrarse</a>
        </form>

        <div class="register-footer">
            <p>¿Ya tienes una cuenta? <a href="index.html">Volver al inicio</a></p>
        </div>
    </div>

</body>
</html>
